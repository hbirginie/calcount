<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>CalCount</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Today</h1>
        </div>

        <div id="tab-repas" class="tab-content active">
            <div class="summary-card">
                <div class="calorie-progress">
                    <div class="calorie-progress-header">
                        <span>Calories</span>
                        <span id="calorie-progress-text">0 / 3000 kcal</span>
                    </div>
                    <div class="progress-bar" aria-hidden="true">
                        <div class="progress-bar-fill" id="calorie-progress-fill"></div>
                    </div>
                </div>

                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-label">Protéines</div>
                        <div class="summary-value" id="total-proteines">0</div>
                        <div class="summary-label">g</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Glucides</div>
                        <div class="summary-value" id="total-glucides">0</div>
                        <div class="summary-label">g</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Lipides</div>
                        <div class="summary-value" id="total-lipides">0</div>
                        <div class="summary-label">g</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="meal-section">
                    <div class="meal-category-header" onclick="ouvrirModalRepas('Breakfast', '☕')">
                        <div class="meal-category-content">
                            <span class="meal-icon">☕</span>
                            <span class="meal-name">Breakfast</span>
                            <span class="meal-count" id="count-breakfast">0 aliment(s)</span>
                        </div>
                        <button class="btn-add-meal"></button>
                    </div>
                </div>

                <div class="meal-section">
                    <div class="meal-category-header" onclick="ouvrirModalRepas('Lunch', '🍔')">
                        <div class="meal-category-content">
                            <span class="meal-icon">🍔</span>
                            <span class="meal-name">Lunch</span>
                            <span class="meal-count" id="count-lunch">0 aliment(s)</span>
                        </div>
                        <button class="btn-add-meal"></button>
                    </div>
                </div>

                <div class="meal-section">
                    <div class="meal-category-header" onclick="ouvrirModalRepas('Snacks', '🍿')">
                        <div class="meal-category-content">
                            <span class="meal-icon">🍿</span>
                            <span class="meal-name">Snacks</span>
                            <span class="meal-count" id="count-snacks">0 aliment(s)</span>
                        </div>
                        <button class="btn-add-meal"></button>
                    </div>
                </div>

                <div class="meal-section">
                    <div class="meal-category-header" onclick="ouvrirModalRepas('Dinner', '🍽️')">
                        <div class="meal-category-content">
                            <span class="meal-icon">🍽️</span>
                            <span class="meal-name">Dinner</span>
                            <span class="meal-count" id="count-dinner">0 aliment(s)</span>
                        </div>
                        <button class="btn-add-meal"></button>
                    </div>
                </div>
            </div>

            <div id="modal-repas" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modal-titre">Ajouter un repas</h3>
                        <button class="btn-close" onclick="fermerModalRepas()">✕</button>
                    </div>
                    
                    <div class="modal-body">
                        <div id="aliments-modal-liste"></div>
                        
                        <div class="form-group" style="margin-top: 20px;">
                            <label for="select-aliment-modal">Aliment *</label>
                            <select id="select-aliment-modal">
                                <option value="">Sélectionner un aliment...</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="quantite-aliment-modal">Quantité (g) *</label>
                            <input 
                                type="number" 
                                id="quantite-aliment-modal" 
                                placeholder="100"
                                required
                                min="1"
                                step="1"
                                onkeypress="if(event.key === 'Enter') ajouterAlimentAuRepasModal()">
                        </div>
                        
                        <button onclick="ajouterAlimentAuRepasModal()" style="margin-top: 10px;">
                            + Ajouter cet aliment
                        </button>
                    </div>
                    
                    <div class="modal-footer">
                        <button onclick="fermerModalRepas()" class="btn-secondary">Terminer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
