<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>CalCount</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Today</h1>
        </div>

        <div id="tab-repas" class="tab-content active">
            <div class="summary-card">
                <div class="calorie-progress">
                    <div class="calorie-circle-container">
                        <svg class="calorie-circle" viewBox="0 0 200 200">
                            <defs>
                                <linearGradient id="gradient-calories" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#34c759;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#30d158;stop-opacity:1" />
                                </linearGradient>
                                <linearGradient id="gradient-warning" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#ff9500;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#ff9f0a;stop-opacity:1" />
                                </linearGradient>
                                <linearGradient id="gradient-danger" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#ff3b30;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#ff453a;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            
                            <circle
                                class="calorie-circle-bg"
                                cx="100"
                                cy="100"
                                r="85"
                                fill="none"
                                stroke="#f2f2f7"
                                stroke-width="12"
                                stroke-linecap="round"
                            />
                            
                            <circle
                                class="calorie-circle-progress"
                                id="calorie-circle-progress"
                                cx="100"
                                cy="100"
                                r="85"
                                fill="none"
                                stroke="url(#gradient-calories)"
                                stroke-width="12"
                                stroke-linecap="round"
                                transform="rotate(-90 100 100)"
                            />
                        </svg>
                        
                        <div class="calorie-circle-content">
                            <div class="calorie-circle-value" id="calorie-current">0</div>
                            <div class="calorie-circle-separator">/</div>
                            <div class="calorie-circle-goal" id="calorie-goal">2600</div>
                            <div class="calorie-circle-unit">kcal</div>
                        </div>
                    </div>
                </div>

                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-label">Protéines</div>
                        <div class="summary-value" id="total-proteines">0</div>
                        <div class="summary-label">g</div>
                        <div class="progress-bar-mini">
                            <div class="progress-bar-fill-mini" id="proteines-progress-fill"></div>
                        </div>
                        <div class="summary-progress-text" id="proteines-progress-text">0 / 150 g</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Glucides</div>
                        <div class="summary-value" id="total-glucides">0</div>
                        <div class="summary-label">g</div>
                        <div class="progress-bar-mini">
                            <div class="progress-bar-fill-mini" id="glucides-progress-fill"></div>
                        </div>
                        <div class="summary-progress-text" id="glucides-progress-text">0 / 300 g</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Lipides</div>
                        <div class="summary-value" id="total-lipides">0</div>
                        <div class="summary-label">g</div>
                        <div class="progress-bar-mini">
                            <div class="progress-bar-fill-mini" id="lipides-progress-fill"></div>
                        </div>
                        <div class="summary-progress-text" id="lipides-progress-text">0 / 80 g</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="meal-section">
                    <div class="meal-category-header" onclick="ouvrirModalRepas('Breakfast', '☕')">
                        <div class="meal-category-content">
                            <span class="meal-icon">☕</span>
                            <span class="meal-name">Breakfast</span>
                            <span class="meal-count" id="count-breakfast">0 aliment(s)</span>
                        </div>
                        <button class="btn-add-meal"></button>
                    </div>
                </div>

                <div class="meal-section">
                    <div class="meal-category-header" onclick="ouvrirModalRepas('Lunch', '🍔')">
                        <div class="meal-category-content">
                            <span class="meal-icon">🍔</span>
                            <span class="meal-name">Lunch</span>
                            <span class="meal-count" id="count-lunch">0 aliment(s)</span>
                        </div>
                        <button class="btn-add-meal"></button>
                    </div>
                </div>

                <div class="meal-section">
                    <div class="meal-category-header" onclick="ouvrirModalRepas('Snacks', '🍿')">
                        <div class="meal-category-content">
                            <span class="meal-icon">🍿</span>
                            <span class="meal-name">Snacks</span>
                            <span class="meal-count" id="count-snacks">0 aliment(s)</span>
                        </div>
                        <button class="btn-add-meal"></button>
                    </div>
                </div>

                <div class="meal-section">
                    <div class="meal-category-header" onclick="ouvrirModalRepas('Dinner', '🍽️')">
                        <div class="meal-category-content">
                            <span class="meal-icon">🍽️</span>
                            <span class="meal-name">Dinner</span>
                            <span class="meal-count" id="count-dinner">0 aliment(s)</span>
                        </div>
                        <button class="btn-add-meal"></button>
                    </div>
                </div>
            </div>

            <div id="modal-repas" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modal-titre">Ajouter un repas</h3>
                        <button class="btn-close" onclick="fermerModalRepas()">✕</button>
                    </div>
                    
                    <div class="modal-body">
                        <div id="aliments-modal-liste"></div>
                        
                        <div class="form-group" style="margin-top: 20px;">
                            <label for="select-aliment-modal">Aliment *</label>
                            <select id="select-aliment-modal">
                                <option value="">Sélectionner un aliment...</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="quantite-aliment-modal">Quantité (g) *</label>
                            <input 
                                type="number" 
                                id="quantite-aliment-modal" 
                                placeholder="100"
                                required
                                min="1"
                                step="1"
                                onkeypress="if(event.key === 'Enter') ajouterAlimentAuRepasModal()">
                        </div>
                        
                        <button onclick="ajouterAlimentAuRepasModal()" style="margin-top: 10px;">
                            + Ajouter cet aliment
                        </button>
                    </div>
                    
                    <div class="modal-footer">
                        <button onclick="fermerModalRepas()" class="btn-secondary">Terminer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
